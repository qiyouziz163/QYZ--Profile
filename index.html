<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司资料介绍 - 企优咨</title>

    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>

    <style>
        :root {
            --bg: #e8ecf1;
            --card-bg: #ffffff;
            --toolbar-bg: rgba(255, 255, 255, 0.92);
            --text: #2c3e50;
            --text-secondary: #5a6c7d;
            --accent: #1a73e8;
            --accent-hover: #1557b0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.08);
            --radius: 10px;
            --radius-sm: 6px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* 工具栏保持不变 */
        .toolbar {
            position: sticky; top: 0; z-index: 100;
            background: var(--toolbar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; flex-wrap: wrap;
            box-shadow: var(--shadow-sm);
        }
        .toolbar.scrolled { box-shadow: var(--shadow-md); }
        .toolbar-title { font-weight: 600; font-size: 15px; white-space: nowrap; }
        .btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 8px 14px; border: 1px solid #dce3ea; border-radius: var(--radius-sm);
            background: #fff; color: var(--text); cursor: pointer; font-size: 13px;
            font-weight: 500; transition: all var(--transition); user-select: none;
        }
        .btn:hover { background: #f5f7fa; border-color: #c5cdd8; }
        .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 50%; }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .zoom-indicator { font-size: 13px; font-weight: 600; min-width: 52px; text-align: center; font-family: var(--font-mono); }
        .page-info { font-size: 13px; color: var(--text-secondary); }
        .divider { width: 1px; height: 22px; background: #dce3ea; margin: 0 6px; }

        /* ✅ 关键修改：移除最大宽度，让内容随窗口变宽 */
        .main-container {
            width: 100%;
            margin: 0 auto;
            padding: 28px 24px 60px;      /* 略微增加两侧边距，保持呼吸感 */
            box-sizing: border-box;
        }

        .pages-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .page-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            width: 100%;                  /* 卡片占满容器宽度 */
            display: flex;
            justify-content: center;
            animation: fadeIn 0.25s ease-out both;
        }
        .page-card canvas {
            display: block;
            max-width: 100%;              /* 确保图片不超出卡片 */
            height: auto;
        }
        .page-label {
            position: absolute; bottom: 10px; right: 14px;
            background: rgba(0,0,0,0.55); color: #fff; font-size: 11px;
            padding: 3px 10px; border-radius: 20px; pointer-events: none;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }

        .loading-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; transition: opacity 0.3s;
        }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .spinner {
            width: 48px; height: 48px; border: 4px solid #dce3ea;
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.75s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-container { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
        .error-container.visible { display: flex; }

        .scroll-top-btn {
            position: fixed; bottom: 28px; right: 28px; z-index: 90;
            width: 44px; height: 44px; border-radius: 50%; background: #fff;
            border: 1px solid #dce3ea; box-shadow: var(--shadow-md);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all var(--transition);
        }
        .scroll-top-btn.visible { opacity: 1; visibility: visible; }

        /* 响应式：在移动端适当减小内边距 */
        @media (max-width: 768px) {
            .toolbar { padding: 8px 12px; }
            .btn { padding: 6px 10px; font-size: 12px; }
            .btn-icon { width: 32px; height: 32px; }
            .main-container { padding: 16px 12px 40px; }
        }
    </style>
</head>
<body>

    <header class="toolbar" id="toolbar">
        <span class="toolbar-title">📄 公司资料介绍</span>
        <div style="display:flex; align-items:center; gap:4px;">
            <button class="btn btn-icon" id="btnZoomOut" title="缩小">−</button>
            <span class="zoom-indicator" id="zoomIndicator">适合宽度</span>
            <button class="btn btn-icon" id="btnZoomIn" title="放大">+</button>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
            <span class="page-info" id="pageInfo">--</span>
            <span class="divider"></span>
            <button class="btn btn-primary" id="btnFitWidth">适应宽度</button>
        </div>
    </header>

    <main class="main-container" id="mainContainer">
        <div class="pages-wrapper" id="pagesWrapper"></div>
    </main>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>正在准备公司资料…</p>
    </div>

    <div class="error-container" id="errorContainer">
        <h2>📁 无法加载PDF</h2>
        <p id="errorMessage">请确认文件“公司资料介绍-企优咨.pdf”已放于同目录下。</p>
        <button class="btn btn-primary" id="btnRetry">重新加载</button>
    </div>

    <button class="scroll-top-btn" id="scrollTopBtn" title="回到顶部">↑</button>

    <script>
        (function() {
            const PDF_URL = './公司资料介绍-企优咨.pdf';
            const QUALITY_FACTOR = 2.0;
            const ZOOM_LEVELS = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
            const ZOOM_FIT_WIDTH = 'fit-width';

            const toolbar = document.getElementById('toolbar');
            const pagesWrapper = document.getElementById('pagesWrapper');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const errorContainer = document.getElementById('errorContainer');
            const errorMessage = document.getElementById('errorMessage');
            const zoomIndicator = document.getElementById('zoomIndicator');
            const pageInfo = document.getElementById('pageInfo');
            const scrollTopBtn = document.getElementById('scrollTopBtn');
            const mainContainer = document.getElementById('mainContainer');
            const btnZoomIn = document.getElementById('btnZoomIn');
            const btnZoomOut = document.getElementById('btnZoomOut');
            const btnFitWidth = document.getElementById('btnFitWidth');
            const btnRetry = document.getElementById('btnRetry');

            let pdfDoc = null;
            let totalPages = 0;
            let currentZoomMode = ZOOM_FIT_WIDTH;
            let currentZoomLevel = 1.0;
            let renderedPages = new Set();
            let isRendering = false;
            let abortController = null;

            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
            pdfjsLib.GlobalWorkerOptions.cMapUrl = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/';
            pdfjsLib.GlobalWorkerOptions.cMapPacked = true;

            function debounce(fn, delay) {
                let timer;
                return function(...args) {
                    clearTimeout(timer);
                    timer = setTimeout(() => fn.apply(this, args), delay);
                };
            }

            function getContainerWidth() {
                const style = getComputedStyle(mainContainer);
                return mainContainer.clientWidth - parseFloat(style.paddingLeft) - parseFloat(style.paddingRight);
            }

            function getFitWidthScale() {
                if (!pdfDoc) return 1.0;
                const containerWidth = getContainerWidth();
                return containerWidth / (pdfDoc._pdfInfo?.pages?.[0]?.mediaBox?.[2] || 595);
            }

            function getEffectiveDisplayScale() {
                return currentZoomMode === ZOOM_FIT_WIDTH ? getFitWidthScale() : currentZoomLevel;
            }

            function formatZoomLabel(mode, level) {
                return mode === ZOOM_FIT_WIDTH ? '适合宽度' : Math.round(level * 100) + '%';
            }

            async function renderPageToCanvas(pageNum, displayScale, qualityFactor = QUALITY_FACTOR) {
                const page = await pdfDoc.getPage(pageNum);
                const renderScale = displayScale * qualityFactor;
                const viewport = page.getViewport({ scale: renderScale });

                const canvas = document.createElement('canvas');
                canvas.width = Math.floor(viewport.width);
                canvas.height = Math.floor(viewport.height);
                canvas.style.width = (viewport.width / qualityFactor) + 'px';
                canvas.style.height = (viewport.height / qualityFactor) + 'px';

                const ctx = canvas.getContext('2d', { alpha: false });
                await page.render({ canvasContext: ctx, viewport }).promise;
                return { canvas, pageNum, displayScale };
            }

            function createAndAppendPageCard(canvasData) {
                const card = document.createElement('div');
                card.className = 'page-card';
                card.dataset.page = canvasData.pageNum;
                card.appendChild(canvasData.canvas);

                const label = document.createElement('span');
                label.className = 'page-label';
                label.textContent = canvasData.pageNum + ' / ' + totalPages;
                card.appendChild(label);

                const existingCards = [...pagesWrapper.children].filter(c => c.dataset.page);
                let insertBefore = null;
                for (const c of existingCards) {
                    if (parseInt(c.dataset.page) > canvasData.pageNum) {
                        insertBefore = c;
                        break;
                    }
                }
                pagesWrapper.insertBefore(card, insertBefore);
            }

            async function renderRemainingPages(displayScale) {
                const BATCH_SIZE = 2;
                for (let i = 2; i <= totalPages; i++) {
                    if (abortController?.signal.aborted) break;
                    if (renderedPages.has(i)) continue;

                    try {
                        const canvasData = await renderPageToCanvas(i, displayScale, QUALITY_FACTOR);
                        if (abortController?.signal.aborted) break;
                        renderedPages.add(i);
                        createAndAppendPageCard(canvasData);
                    } catch (err) {
                        if (!abortController?.signal.aborted) console.warn('渲染第' + i + '页失败:', err);
                    }

                    if (i % BATCH_SIZE === 0) {
                        await new Promise(resolve => setTimeout(resolve, 0));
                    }
                }
            }

            async function reRenderAllPages(displayScale) {
                if (isRendering) abortController?.abort();
                abortController = new AbortController();
                isRendering = true;

                pagesWrapper.innerHTML = '';
                renderedPages.clear();
                errorContainer.classList.remove('visible');
                mainContainer.style.display = '';

                try {
                    const firstPageData = await renderPageToCanvas(1, displayScale, QUALITY_FACTOR);
                    if (abortController.signal.aborted) return;
                    renderedPages.add(1);
                    createAndAppendPageCard(firstPageData);

                    renderRemainingPages(displayScale);
                } catch (err) {
                    if (!abortController.signal.aborted) showError('渲染失败：' + err.message);
                } finally {
                    isRendering = false;
                    updatePageInfo();
                }
            }

            async function loadPDF() {
                pdfDoc = null;
                totalPages = 0;
                renderedPages.clear();
                pagesWrapper.innerHTML = '';
                errorContainer.classList.remove('visible');
                mainContainer.style.display = '';
                loadingOverlay.classList.remove('hidden');

                try {
                    const loadingTask = pdfjsLib.getDocument({
                        url: PDF_URL,
                        cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/',
                        cMapPacked: true,
                    });

                    pdfDoc = await loadingTask.promise;
                    totalPages = pdfDoc.numPages;
                    updatePageInfo();

                    const displayScale = getEffectiveDisplayScale();
                    const firstPageData = await renderPageToCanvas(1, displayScale, QUALITY_FACTOR);
                    renderedPages.add(1);
                    createAndAppendPageCard(firstPageData);

                    loadingOverlay.classList.add('hidden');
                    renderRemainingPages(displayScale);
                } catch (err) {
                    console.error(err);
                    loadingOverlay.classList.add('hidden');
                    showError('无法加载PDF：' + err.message);
                }
            }

            function showError(msg) {
                errorMessage.textContent = msg;
                errorContainer.classList.add('visible');
                mainContainer.style.display = 'none';
            }

            function updatePageInfo() {
                pageInfo.textContent = totalPages ? `共 ${totalPages} 页` : '--';
                zoomIndicator.textContent = formatZoomLabel(currentZoomMode, currentZoomLevel);
            }

            function changeZoom(mode, level) {
                if (!pdfDoc || isRendering) return;
                currentZoomMode = mode;
                currentZoomLevel = level;
                updatePageInfo();
                reRenderAllPages(getEffectiveDisplayScale());
            }

            function zoomIn() {
                if (!pdfDoc) return;
                if (currentZoomMode === ZOOM_FIT_WIDTH) {
                    const fit = getFitWidthScale();
                    let target = ZOOM_LEVELS[ZOOM_LEVELS.length-1];
                    for (const lv of ZOOM_LEVELS) { if (lv > fit + 0.01) { target = lv; break; } }
                    changeZoom('fixed', target);
                } else {
                    let target = currentZoomLevel;
                    for (const lv of ZOOM_LEVELS) { if (lv > currentZoomLevel + 0.01) { target = lv; break; } }
                    if (target !== currentZoomLevel) changeZoom('fixed', target);
                }
            }

            function zoomOut() {
                if (!pdfDoc) return;
                if (currentZoomMode === ZOOM_FIT_WIDTH) {
                    const fit = getFitWidthScale();
                    let target = ZOOM_LEVELS[0];
                    for (let i = ZOOM_LEVELS.length-1; i >= 0; i--) { if (ZOOM_LEVELS[i] < fit - 0.01) { target = ZOOM_LEVELS[i]; break; } }
                    changeZoom('fixed', target);
                } else {
                    let target = currentZoomLevel;
                    for (let i = ZOOM_LEVELS.length-1; i >= 0; i--) { if (ZOOM_LEVELS[i] < currentZoomLevel - 0.01) { target = ZOOM_LEVELS[i]; break; } }
                    if (target !== currentZoomLevel) changeZoom('fixed', target);
                }
            }

            function fitWidth() { if (pdfDoc) changeZoom(ZOOM_FIT_WIDTH, 1.0); }

            btnZoomIn.addEventListener('click', zoomIn);
            btnZoomOut.addEventListener('click', zoomOut);
            btnFitWidth.addEventListener('click', fitWidth);
            btnRetry.addEventListener('click', loadPDF);

            window.addEventListener('resize', debounce(() => {
                if (currentZoomMode === ZOOM_FIT_WIDTH && pdfDoc && !isRendering) {
                    reRenderAllPages(getFitWidthScale());
                }
            }, 300));

            window.addEventListener('scroll', debounce(() => {
                toolbar.classList.toggle('scrolled', window.scrollY > 10);
                scrollTopBtn.classList.toggle('visible', window.scrollY > 500);
            }, 80), { passive: true });

            scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomIn(); }
                else if (e.key === '-') { e.preventDefault(); zoomOut(); }
                else if (e.key === '0' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); fitWidth(); }
            });

            loadPDF();
        })();
    </script>
</body>
</html>
